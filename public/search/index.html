<!doctype html>

<html>

<head>

    <meta charset="utf-8">

    <title>Bible Search</title>

    <link href="../bootstrap.min.css" rel="stylesheet">

    <link href="./style.css" rel="stylesheet">

</head>

<body>

    <div class="container mt-4">

        <p>Sefer Search 1.0</p>

        <div class="row mb-3">

            <div class="col-md-3">

                <select id="book" class="form-select">

                    <option value="all">All Books</option>

                </select>

            </div>

            <div class="col-md-7">

                <input id="search" class="form-control" placeholder="Search verse..." value="">

            </div>

            <div class="col-md-2">

                <button class="btn btn-primary w-100" id="btnSearch">
                    Search
                </button>

            </div>

        </div>

        <div id="results"></div>

    </div>

    <script src="app.js"></script>

</body>

</html>
